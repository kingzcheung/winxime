customization:
  distribution_code_name: Xime
  distribution_version: 0.13.3
  generator: "Xime"
  modified_time: "2021-07-26"
  rime_version: 0.14.3

wubi_radicals:
  # 字根快捷键配置
  hotkeys:
    # 在候选框可见时，单独按 Ctrl 显示最后按键的字根，松开隐藏
    show_key: Ctrl
    show_all_keys: None
  action: None
  schema_radicals:
    wubi86: &wubi86_radicals
      # 第一区：横起笔 (1)
      g: "王龶五一戋"
      f: "土士二干十寸雨"
      d: "大犬三古龵镸石厂丆"
      s: "木丁西"
      a: "工匚戈艹廿龷七弋戈"
      
      # 第二区：竖起笔 (2)
      h: "目丨卜⺊上止龰"
      j: "日曰早廾刂虫丿Ⅱ"
      k: "口Ⅲ川"
      l: "田甲囗四罒车皿力"
      m: "山由贝冂冎几"
      
      # 第三区：撇起笔 (3)
      t: "禾竹丿𠂉彳夂攵"
      r: "白手龵扌斤𰀪𠂆"
      e: "月⺼彡乃用爫彡𧘇豕"
      w: "人亻八癶"
      q: "金 钅𠂊勺㐅 犭𱼀"
      
      # 第四区：捺起笔 (4)
      y: "言讠文方广亠丶乀"
      u: "立六辛冫丬门疒丷䒑"
      i: "水氵小氺头𭕄⺌"
      o: "火灬米"
      p: "之辶冖宀廴礻"
      
      # 第五区：折起笔 (5)
      n: "已己巳心忄羽乙𠃜"
      b: "子耳了也阝卩㔾凵"
      v: "女刀九臼巛彐"
      c: "又巴马厶龴ス"
      x: "弓匕纟幺弓𠤎"
    wubi86_pinyin: *wubi86_radicals

style:
  font_size: 14
  candidate_count: 5
  horizontal: true
  color_scheme: lavender_purple

color_schemes:
  lavender_purple:
    name: "薰衣草紫"
    primary_color: 0x8F73E2
  
  ocean_blue:
    name: "海洋蔚蓝"
    primary_color: 0x1A73E8
  
  forest_green:
    name: "森林翠绿"
    primary_color: 0x2E7D32
  
  sunset_orange:
    name: "落日橙光"
    primary_color: 0xE65100
  
  coral_red:
    name: "珊瑚绯红"
    primary_color: 0xC62828
  
  slate_gray:
    name: "沉稳石墨"
    primary_color: 0x424242
  
  rose_pink:
    name: "浪漫玫瑰"
    primary_color: 0xAD1457
  
  teal_cyan:
    name: "青碧如水"
    primary_color: 0x00796B

smart_suggestion:
  enabled: true
  suggestion_count: 5
  record_user_frequency: true
  auto_adjust_frequency: true
  learning_threshold: 3
  
  model:
    provider: "modelscope"
    name: "predictive-text-small"
    auto_download: true
    files:
      - url: "https://modelscope.cn/models/bikeand/predictive-text-small/resolve/master/vocab.json"
        filename: "vocab.json"
      - url: "https://modelscope.cn/models/bikeand/predictive-text-small/resolve/master/model.onnx"
        filename: "model.onnx"
      - url: "https://modelscope.cn/models/bikeand/predictive-text-small/resolve/master/model.onnx.data"
        filename: "model.onnx.data"