[package]
name = "winxime-setup"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "GPL-3.0"
repository.workspace = true

[dependencies]
gpui = { package = "gpui-unofficial", version = "1.1.7" }
gpui-platform = { package = "gpui-platform-gpui-unofficial", version = "1.1.7" }
winxime-config = { path = "../winxime-config" }
anyhow = "1.0"
windows = { version = "0.61", features = ["Win32_UI_WindowsAndMessaging", "Win32_Foundation"] }
raw-window-handle = "0.6"
rust-embed = { version = "8", features = ["interpolate-folder-path"] }

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"