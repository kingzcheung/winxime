name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:
    outputs:
      unsigned-artifact-id:
        description: "Unsigned Installer"
        value: ${{ jobs.package.outputs.unsigned-artifact-id }}

jobs:
  build:
    runs-on: windows-latest
    name: Build
    env:
      BOOST_ROOT: ${{ github.workspace }}\librime\deps\boost-1.89.0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: pip install ninja

      - name: Create env.bat for librime
        run: |
          $envfile = "librime\env.bat"
          $envcontent = @"
          set RIME_ROOT=%CD%
          set CMAKE_GENERATOR=Ninja
          "@
          Set-Content -Path $envfile -Value $envcontent

      - name: Install boost
        run: |
          cd librime
          .\install-boost.bat

      - name: Build librime dependencies
        run: |
          cd librime
          .\build.bat deps

      - name: Build librime
        run: |
          cd librime
          .\build.bat librime

      - name: Verify librime build output
        run: |
          echo "Checking for rime.dll in various locations:"
          if exist librime\dist\lib\rime.dll (echo "FOUND: librime\dist\lib\rime.dll") else (echo "NOT FOUND: librime\dist\lib\rime.dll")
          if exist librime\dist\bin\rime.dll (echo "FOUND: librime\dist\bin\rime.dll") else (echo "NOT FOUND: librime\dist\bin\rime.dll")
          if exist librime\build\bin\rime.dll (echo "FOUND: librime\build\bin\rime.dll") else (echo "NOT FOUND: librime\build\bin\rime.dll")
          if exist librime\build\lib\rime.dll (echo "FOUND: librime\build\lib\rime.dll") else (echo "NOT FOUND: librime\build\lib\rime.dll")
          if exist librime\build\Release\rime.dll (echo "FOUND: librime\build\Release\rime.dll") else (echo "NOT FOUND: librime\build\Release\rime.dll")
          echo "Listing librime/dist directory:"
          if exist librime\dist (dir /s librime\dist) else (echo "dist directory does not exist")
          echo "Listing librime/build directory:"
          if exist librime\build (dir /s librime\build) else (echo "build directory does not exist")

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --quiet

      - name: Prepare data files
        run: |
          if exist target\release\data (
            echo data already exists
          ) else (
            xcopy /E /I /Y librime\data target\release\data
          )

      - uses: actions/upload-artifact@v4
        with:
          name: Release Binaries
          path: |
            target/release/winxime-server.exe
            target/release/winxime_tsf.dll
            target/release/winxime-setup.exe
            target/release/winxime-tsf-register.exe
            target/release/rime.dll
            target/release/data

  package:
    runs-on: windows-latest
    name: Package
    outputs:
      unsigned-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    needs: [build]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Swatinem/rust-cache@v2

      - name: Download Release Binaries
        uses: actions/download-artifact@v4
        with:
          name: Release Binaries
          path: target/release

      - name: Install WiX
        run: |
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/v3.14.1/wix314.exe" -OutFile wix314.exe
          Start-Process wix314.exe -ArgumentList "/quiet", "/norestart" -Wait

      - name: Harvest data files
        run: |
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          & "$wixPath\heat.exe" dir target\release\data -o crates\winxime-server\wix\data.wxs -dr DataFolder -cg DataFiles -var var.DataDir -sreg -srd -ag

      - name: Build MSI
        run: |
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          & "$wixPath\candle.exe" -arch x64 crates\winxime-server\wix\main.wxs crates\winxime-server\wix\data.wxs -ext WixUIExtension -ext WixUtilExtension -dCargoTargetBinDir=target\release -dDataDir=target\release\data -dVersion=0.1.0 -out target\wix\
          & "$wixPath\light.exe" target\wix\main.wixobj target\wix\data.wixobj -ext WixUIExtension -ext WixUtilExtension -out target\wix\xime-0.1.0.msi

      - id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned Installer
          path: target/wix/xime-0.1.0.msi