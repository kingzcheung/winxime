name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:
    outputs:
      unsigned-artifact-id:
        description: "Unsigned Installer"
        value: ${{ jobs.package.outputs.unsigned-artifact-id }}

jobs:
  build:
    runs-on: windows-latest
    name: Build
    env:
      BOOST_ROOT: ${{ github.workspace }}\librime\deps\boost-1.89.0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Init nested submodules
        run: git submodule update --init --recursive

      - name: Cache librime build
        id: cache-librime
        uses: actions/cache@v4
        with:
          path: |
            librime/dist
            librime/deps/boost-*
          key: librime-${{ hashFiles('librime/src/**', 'librime/CMakeLists.txt', 'librime/build.bat', 'librime/deps/**/CMakeLists.txt', 'crates/librime-sys/build.rs') }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build tools
        if: steps.cache-librime.outputs.cache-hit != 'true'
        run: choco install aria2 7zip -y

      - name: Build librime
        if: steps.cache-librime.outputs.cache-hit != 'true'
        shell: cmd
        working-directory: librime
        run: |
          copy env.vs2022.bat env.bat
          echo set ARCH=x64 >> env.bat
          call install-boost.bat
          build.bat deps
          build.bat librime shared
          if not exist "%CD%\dist\lib\rime.dll" (echo ERROR: rime.dll not created && dir "%CD%\dist\lib" && exit /b 1)

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --quiet

      - name: Prepare config files
        shell: cmd
        run: |
          if exist target\release\config (
            echo config already exists
          ) else (
            xcopy /E /I /Y rime-wubi target\release\config
          )

      - uses: actions/upload-artifact@v4
        with:
          name: Release Binaries
          path: |
            target/release/winxime-server.exe
            target/release/winxime_tsf.dll
            target/release/winxime-setup.exe
            target/release/winxime-tsf-register.exe
            target/release/rime.dll
            target/release/config

  package:
    runs-on: windows-latest
    name: Package
    outputs:
      unsigned-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    needs: [build]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Swatinem/rust-cache@v2

      - name: Download Release Binaries
        uses: actions/download-artifact@v4
        with:
          name: Release Binaries
          path: target/release

      - name: Install WiX
        run: |
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314.exe" -OutFile wix314.exe
          Start-Process wix314.exe -ArgumentList "/quiet", "/norestart" -Wait

      - name: Harvest config files
        run: |
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          & "$wixPath\heat.exe" dir target\release\config -o crates\winxime-server\wix\data.wxs -dr DataFolder -cg DataFiles -var var.DataDir -sreg -srd -ag

      - name: Build MSI
        id: msi
        run: |
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          $env:PATH += ";$wixPath"
          $version = "${{ github.ref_name }}"
          if ($version -notmatch "^v") { $version = "0.1.0" }
          else { $version = $version.Substring(1) }
          candle -arch x64 crates\winxime-server\wix\main.wxs crates\winxime-server\wix\data.wxs -ext WixUIExtension -ext WixUtilExtension -dCargoTargetBinDir=target\release -dDataDir=target\release\config -dVersion="$version" -out target\wix\
          light target\wix\main.wixobj target\wix\data.wixobj -ext WixUIExtension -ext WixUtilExtension -cultures:zh-CN -loc crates\winxime-server\wix\zh-cn.wxl -out target\wix\xime-$version.msi
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned Installer
          path: target/wix/xime-${{ steps.msi.outputs.version }}.msi