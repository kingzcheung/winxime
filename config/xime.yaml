# Xime UI settings
# encoding: utf-8
#
# This file is distributed with winxime installation.
# User customizations should be saved to %APPDATA%\Rime\xime.custom.yaml

config_version: "1.0"

default_schema: wubi86_jidian

app_options:
  cmd.exe:
    ascii_mode: true
  conhost.exe:
    ascii_mode: true

style:
  font_family: "Microsoft YaHei UI"
  font_size: 14
  candidate_count: 5
  show_code_hint: false
  horizontal: true
  corner_radius: 8.0
  color_scheme: lavender_purple

color_schemes:
  lavender_purple:
    name: "薰衣草紫"
    primary_color: 0x8F73E2
  
  ocean_blue:
    name: "海洋蔚蓝"
    primary_color: 0x1A73E8
  
  forest_green:
    name: "森林翠绿"
    primary_color: 0x2E7D32
  
  sunset_orange:
    name: "落日橙光"
    primary_color: 0xE65100
  
  coral_red:
    name: "珊瑚绯红"
    primary_color: 0xC62828
  
  slate_gray:
    name: "沉稳石墨"
    primary_color: 0x424242
  
  rose_pink:
    name: "浪漫玫瑰"
    primary_color: 0xAD1457
  
  teal_cyan:
    name: "青碧如水"
    primary_color: 0x00796B